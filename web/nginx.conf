# 深圳学位房规划助手 - Nginx 配置示例
# 保存到 /etc/nginx/sites-available/xuequ 或 /etc/nginx/conf.d/xuequ.conf

server {
    listen 80;
    server_name _;  # 或替换为你的域名，如 xuequ.example.com

    # 前端静态文件 - 访问 /xuequ/ 时
    location /xuequ/ {
        alias /var/www/xuequ/;
        index index.html;
        
        # 尝试查找文件，支持SPA路由
        try_files $uri $uri/ /xuequ/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端API反代 - 访问 /xuequ/api/ 时
    location /xuequ/api/ {
        proxy_pass http://127.0.0.1:8890/;
        
        # HTTP头配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 根路径重定向
    location = / {
        return 301 /xuequ/;
    }

    # 日志
    access_log /var/log/nginx/xuequ_access.log;
    error_log /var/log/nginx/xuequ_error.log;
}

